name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  MUPDF_VERSION: "1.25.2"

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install system deps for MuPDF
        run: brew install openjpeg freetype harfbuzz jbig2dec little-cms2 libjpeg-turbo zlib gumbo-parser

      - name: Build MuPDF from source
        run: |
          git clone --recursive --depth 1 --branch ${{ env.MUPDF_VERSION }} https://github.com/ArtifexSoftware/mupdf.git mupdf-src
          cd mupdf-src
          make HAVE_GLUT=no USE_SYSTEM_LIBS=yes SYS_OPENJPEG_CFLAGS="-I$(brew --prefix openjpeg)/include/openjpeg-2.5" SYS_OPENJPEG_LIBS="-L$(brew --prefix openjpeg)/lib -lopenjp2" build=release libs
          mkdir -p ../src-tauri/libs/macos
          cp build/release/libmupdf.a ../src-tauri/libs/macos/
          cp build/release/libmupdf-third.a ../src-tauri/libs/macos/

      - run: pnpm install
      - run: pnpm tauri build --target aarch64-apple-darwin

      - uses: actions/upload-artifact@v4
        with:
          name: MiniPDF-macOS-aarch64
          path: src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Clone MuPDF source
        run: |
          git clone --recursive --depth 1 --branch ${{ env.MUPDF_VERSION }} https://github.com/ArtifexSoftware/mupdf.git mupdf-src
          New-Item -ItemType Directory -Force -Path src-tauri\libs\windows
        shell: pwsh

      - name: Build MuPDF (MSBuild)
        shell: cmd
        run: |
          for /f "usebackq delims=" %%i in (`"%ProgramFiles(x86)%\Microsoft Visual Studio\Installer\vswhere.exe" -latest -property installationPath`) do set "VSPATH=%%i"
          call "%VSPATH%\VC\Auxiliary\Build\vcvars64.bat"
          cd mupdf-src
          msbuild platform\win32\libmupdf.vcxproj /p:Configuration=Release /p:Platform=x64
          msbuild platform\win32\libthirdparty.vcxproj /p:Configuration=Release /p:Platform=x64
          copy platform\win32\x64\Release\libmupdf.lib ..\src-tauri\libs\windows\mupdf.lib
          copy platform\win32\x64\Release\libthirdparty.lib ..\src-tauri\libs\windows\mupdf-third.lib

      - run: pnpm install
      - run: pnpm tauri build

      - uses: actions/upload-artifact@v4
        with:
          name: MiniPDF-Windows-x64
          path: src-tauri/target/release/bundle/nsis/*.exe